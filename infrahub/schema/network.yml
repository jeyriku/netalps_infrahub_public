# ─────────────────────────────────────────────────────────────────────────────
# Infrahub Schema — Netalps Namespace
#
# Defines the data types used for the frr-infrahub demo:
#   - NetalpsNetworkDevice  : FRR router or Linux host
#   - NetalpsInterface      : network interface with OSPF/BFD parameters
#
# Chargement :
#   infrahubctl schema load infrahub/schema/network.yml --branch main
#   or via Python : infrahub/load_data.py (loads the schema first)
#
# Verification:
#   infrahubctl schema check infrahub/schema/network.yml
# ─────────────────────────────────────────────────────────────────────────────
---
version: "1.0"

nodes:

  # ─── Network device (FRR router or host) ────────────────────────────────────
  - name: NetworkDevice
    namespace: Netalps
    description: "Network device managed in the frr-infrahub-demo lab"
    label: "Network Device"
    icon: "mdi:router"
    human_friendly_id:
      - hostname__value
    order_by:
      - hostname__value
    uniqueness_constraints:
      - ["hostname__value"]
    attributes:
      - name: hostname
        kind: Text
        label: "Hostname"
        unique: true

      - name: role
        kind: Dropdown
        label: "Role"
        choices:
          - name: router
            label: "Router"
            color: "#00b4d8"
            description: "FRR router"
          - name: host
            label: "Host"
            color: "#90caf9"
            description: "Linux host"

      - name: loopback_ip
        kind: IPHost
        label: "Loopback IP"
        optional: true
        description: "Adresse loopback (ex: 10.0.0.1/32)"

      - name: mgmt_ip
        kind: IPHost
        label: "Management IP"
        optional: true
        description: "IP de management Containerlab"

      - name: ospf_router_id
        kind: Text
        label: "OSPF Router-ID"
        optional: true
        description: "Router-ID OSPF (ex: 10.0.0.1)"

      - name: clab_container
        kind: Text
        label: "Containerlab Container Name"
        optional: true
        description: "ex: clab-frr-infrahub-demo-frr-rtr-01"

      - name: description
        kind: Text
        label: "Description"
        optional: true

    relationships:
      - name: interfaces
        peer: NetalpsInterface
        label: "Interfaces"
        cardinality: many
        direction: bidirectional
        optional: true

  # ─── Network interface ───────────────────────────────────────────────────────
  - name: Interface
    namespace: Netalps
    description: "Network interface with OSPF/BFD parameters"
    label: "Interface"
    icon: "mdi:ethernet"
    order_by:
      - device__hostname__value
      - name__value
    attributes:
      - name: name
        kind: Text
        label: "Name"
        description: "ex: eth1, eth2, lo"

      - name: description
        kind: Text
        label: "Description"
        optional: true

      - name: ip_address
        kind: IPHost
        label: "IP Address"
        optional: true
        description: "Adresse IP avec masque (ex: 10.0.12.1/30)"

      - name: peer_ip
        kind: IPHost
        label: "Peer IP"
        optional: true
        description: "IP du voisin direct (pour BFD)"

      - name: ospf_enabled
        kind: Boolean
        label: "OSPF Enabled"
        default_value: false

      - name: ospf_passive
        kind: Boolean
        label: "OSPF Passive"
        default_value: false
        description: "Interface passive OSPF (LAN)"

      - name: ospf_area
        kind: Text
        label: "OSPF Area"
        optional: true
        default_value: "0"
        description: "Area OSPF (ex: 0, 1, 0.0.0.1)"

      - name: ospf_network_type
        kind: Dropdown
        label: "OSPF Network Type"
        optional: true
        choices:
          - name: point-to-point
            label: "Point-to-Point"
            color: "#4caf50"
          - name: broadcast
            label: "Broadcast"
            color: "#ff9800"

      - name: bfd_enabled
        kind: Boolean
        label: "BFD Enabled"
        default_value: false

      - name: bfd_detect_multiplier
        kind: Number
        label: "BFD Detect Multiplier"
        optional: true
        default_value: 3

      - name: bfd_min_rx
        kind: Number
        label: "BFD Min RX (ms)"
        optional: true
        default_value: 300

      - name: bfd_min_tx
        kind: Number
        label: "BFD Min TX (ms)"
        optional: true
        default_value: 300

    relationships:
      - name: device
        peer: NetalpsNetworkDevice
        label: "Device"
        cardinality: one
        direction: bidirectional
        optional: false
