---
# Lab : frr-infrahub-demo
# Description : Demo CI/CD + SSOT — Containerlab + FRR OSPF/BFD (4 routeurs) + Infrahub + PyATS
# Images       : frrouting/frr:latest, basic-host:latest
#
# Topologie :
#
#  host-left                                                       host-right
# 192.168.10.10/24                                               192.168.40.10/24
#      eth1                                                           eth1
#       │                                                              │
#   eth2│ (LAN)                                               (LAN) eth2│
# ┌───────────┐ eth1◄──10.0.12.0/30──►eth1 ┌───────────┐   ┌───────────┐ eth1◄──10.0.34.0/30──►eth1 ┌───────────┐
# │ frr-rtr-01│                             │ frr-rtr-02│   │ frr-rtr-03│                             │ frr-rtr-04│
# │ 10.0.0.1  │                             │ 10.0.0.2  │   │ 10.0.0.3  │                             │ 10.0.0.4  │
# └───────────┘                             └───────────┘   └───────────┘                             └───────────┘
#                                                eth2◄──10.0.23.0/30──►eth1
#
# Infrahub (SSOT) : http://localhost:8000
#   - Single source of truth for all network parameters
#   - FRR configs are generated by scripts/generate_configs.py
#
# Pipeline CI/CD :
#   [infrahub_setup] → [load_schema] → [load_data] → [generate_configs]
#   → [deploy_lab] → [pre_check] → [post_check] → [cleanup]
#
# Prerequisites:
#   docker pull frrouting/frr:latest
#   cd infrahub && docker compose up -d
#   python infrahub/load_data.py
#   python scripts/generate_configs.py
#   clab deploy -t topology.clab.yml

name: frr-infrahub-demo

mgmt:
  network: clab-mgmt-frr-infrahub
  ipv4-subnet: 172.20.36.0/24

topology:
  nodes:

    # ─── Routeurs FRR ─────────────────────────────────────────────────────────
    frr-rtr-01:
      kind: linux
      image: frrouting/frr:latest
      mgmt-ipv4: 172.20.36.11
      binds:
        - configs/frr-rtr-01/daemons:/etc/frr/daemons
        - configs/frr-rtr-01/frr.conf:/etc/frr/frr.conf
        - configs/frr-rtr-01/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.12.1/30 dev eth1
        - ip addr add 192.168.10.1/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    frr-rtr-02:
      kind: linux
      image: frrouting/frr:latest
      mgmt-ipv4: 172.20.36.12
      binds:
        - configs/frr-rtr-02/daemons:/etc/frr/daemons
        - configs/frr-rtr-02/frr.conf:/etc/frr/frr.conf
        - configs/frr-rtr-02/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.12.2/30 dev eth1
        - ip addr add 10.0.23.1/30 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    frr-rtr-03:
      kind: linux
      image: frrouting/frr:latest
      mgmt-ipv4: 172.20.36.13
      binds:
        - configs/frr-rtr-03/daemons:/etc/frr/daemons
        - configs/frr-rtr-03/frr.conf:/etc/frr/frr.conf
        - configs/frr-rtr-03/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.23.2/30 dev eth1
        - ip addr add 10.0.34.1/30 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    frr-rtr-04:
      kind: linux
      image: frrouting/frr:latest
      mgmt-ipv4: 172.20.36.14
      binds:
        - configs/frr-rtr-04/daemons:/etc/frr/daemons
        - configs/frr-rtr-04/frr.conf:/etc/frr/frr.conf
        - configs/frr-rtr-04/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        - sysctl -w net.ipv4.ip_forward=1
        - ip addr add 10.0.34.2/30 dev eth1
        - ip addr add 192.168.40.1/24 dev eth2
        - ip link set eth1 up
        - ip link set eth2 up

    # ─── Linux Hosts ──────────────────────────────────────────────────────────
    host-left:
      kind: linux
      image: nicolaka/netshoot:latest
      mgmt-ipv4: 172.20.36.21
      exec:
        - ip addr add 192.168.10.10/24 dev eth1
        - ip link set eth1 up
        - ip route add 192.168.40.0/24 via 192.168.10.1
        - ip route add 10.0.0.0/8 via 192.168.10.1
        - ssh-keygen -A
        - service ssh start

    host-right:
      kind: linux
      image: nicolaka/netshoot:latest
      mgmt-ipv4: 172.20.36.22
      exec:
        - ip addr add 192.168.40.10/24 dev eth1
        - ip link set eth1 up
        - ip route add 192.168.10.0/24 via 192.168.40.1
        - ip route add 10.0.0.0/8 via 192.168.40.1
        - ssh-keygen -A
        - service ssh start

  links:
    - endpoints: ["frr-rtr-01:eth1", "frr-rtr-02:eth1"]
    - endpoints: ["frr-rtr-02:eth2", "frr-rtr-03:eth1"]
    - endpoints: ["frr-rtr-03:eth2", "frr-rtr-04:eth1"]
    - endpoints: ["frr-rtr-01:eth2", "host-left:eth1"]
    - endpoints: ["frr-rtr-04:eth2", "host-right:eth1"]
