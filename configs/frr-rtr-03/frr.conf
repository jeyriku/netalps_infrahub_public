frr version 9.1
frr defaults traditional
hostname frr-rtr-03
log syslog informational
no ipv6 forwarding
!
! ── Generated via Infrahub SSOT ─ scripts/generate_configs.py ──
!
interface lo
 ip address 10.0.0.3/32
 ip ospf area 0
!
interface eth1
 description Link to frr-rtr-02 (10.0.23.0/30)
 ip ospf area 0
 ip ospf bfd
 ip ospf network point-to-point
!
interface eth2
 description Link to frr-rtr-04 (10.0.34.0/30)
 ip ospf area 0
 ip ospf bfd
 ip ospf network point-to-point
!
router ospf
 ospf router-id 10.0.0.3
 passive-interface default
 no passive-interface eth1
 no passive-interface eth2
 network 10.0.0.3/32 area 0
 network 10.0.23.0/30 area 0
 network 10.0.34.0/30 area 0
!
bfd
 peer 10.0.23.1 interface eth1
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
 peer 10.0.34.2 interface eth2
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
!
end
